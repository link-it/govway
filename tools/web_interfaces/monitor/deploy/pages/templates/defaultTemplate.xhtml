	markupType="html5" contentType="text/html" sidebarPosition="left"
	theme="simple" sidebarWidth="275">
	<f:loadBundle var="msg" basename="messages" />
	<a4j:loadScript src="/scripts/polyfill-ie11.min.js" rendered="#{_abilita_polyfill_ie_}"/>
	<a4j:loadScript src="resource://jquery.js"/>
	<a4j:loadScript src="resource://org/richfaces/renderkit/html/scripts/jquery.hotkeys.js"/>
	<a4j:loadScript src="resource://scripts/utils.min.js"/>

	<f:facet name="pageHeader">

		<link href="#{facesContext.externalContext.request.contextPath}/images/favicon.ico" rel="shortcut icon" type="image/x-icon" nonce="#{_csp_random_nonce}" />
		<meta http-equiv="Content-Type" content="text/xml; charset=utf-8"/>
		<!--[if !(IE)]><!-->

			href="#{facesContext.externalContext.request.contextPath}/css/roboto/roboto-fontface.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<!--<![endif]-->
		<!--[if gt IE 8]>
     	<link
			href="#{facesContext.externalContext.request.contextPath}/css/roboto/roboto-fontface.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />

		<!--[if lte IE 8]>
     	<link
			href="#{facesContext.externalContext.request.contextPath}/css/roboto/roboto-fontface-iefix.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
    	<![endif]-->
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/materialIcons/material-icons-fontface.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/linkit-base.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/linkit-jsf.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/linkit-crumbs.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/linkit-form.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/mimetype.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/linkit-icons.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/materialIcons.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/c3.min.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/ChartMap.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<link
			href="#{facesContext.externalContext.request.contextPath}/css/bootstrap-tagsinput.css"
			rel="stylesheet" type="text/css" nonce="#{_csp_random_nonce}" />
		<script type="text/javascript" nonce="#{_csp_random_nonce}">
	       A4J.AJAX.onExpired = function(loc, expiredMsg){
				return loc;
	    	}
	   </script>
   	  </f:facet>
      <f:facet name="header">
      	<ui:include src="/commons/includes/header.xhtml" />
      </f:facet>
      
	
	<f:facet name="sidebar">
		<h:panelGroup layout="block" styleClass="#{applicationBean.menuDisabled ? 'menu-disabled' : ''}">
			<ui:include src="/commons/includes/menu.xhtml" />
		</h:panelGroup>
	</f:facet>
	
	<!-- Body -->
	<ui:include src="/commons/includes/status.xhtml" />
	<rich:panel id="bodyWrapper" styleClass="noborder">
		<rich:jQuery name="activeRow" 
						timing="onJScall" 
						query="hover(function(){jQuery(this).addClass('active')},function(){jQuery(this).removeClass('active')})" />
		<rich:jQuery name="checkBrowser" timing="onJScall" selector="a[id*='iconLink']" query="addClass((jQuery.browser.msie &amp;&amp; jQuery.browser.version=='6.0') ? 'iconLinkie' : '')" />
		
		<script type="text/javascript" nonce="#{_csp_random_nonce}">
			 jQuery(document).ready(function() {
				if(jQuery.browser.msie){
					if(jQuery.browser.version=="6.0")
						jQuery("a[id*='iconLink']").addClass('iconLink');
				}
			 });

			 function IEVersione (){
	            var ua = window.navigator.userAgent;
	        
	            var msie = ua.indexOf('MSIE ');
	            if (msie > 0) {
	              // IE 10 or older => return version number
	              return parseInt(ua.substring(msie + 5, ua.indexOf('.', msie)), 10);
	            }
	        
	            var trident = ua.indexOf('Trident/');
	            if (trident > 0) {
	              // IE 11 => version
	              var rv = ua.indexOf('rv:');
	              return parseInt(ua.substring(rv + 3, ua.indexOf('.', rv)), 10);
	            }
	        
	            var edge = ua.indexOf('Edge/');
	            if (edge > 0) {
	              // Edge (IE 12+) => version
	              return parseInt(ua.substring(edge + 5, ua.indexOf('.', edge)), 10);
	            }
	        
	            return -1;
	        }
	        
	        function isIE(){
	            return IEVersione() > -1;
	        }

			function aggiornaTitoloPagina(){
				var nuovoTitolo = jQuery("[id='licenseOutputText']").text();
				
				jQuery(document).attr('title', nuovoTitolo);
			}
		</script>
		<h:panelGrid width="100%">
				<rich:layout id="mainct">
					<rich:layoutPanel id="navbar" position="top">
						<a4j:form prependId="false">
							<input type="hidden" id="_csrfNavbar" name="_csrf" value="#{loginBean.csrf}"/>
							<h:panelGroup layout="block" rendered="#{not applicationBean.menuDisabled}">
								<div id="breadcrumb-ct">
									<div id="crumbs"><ui:insert name="navbar"></ui:insert></div>
								</div>
							</h:panelGroup>
						</a4j:form>
					</rich:layoutPanel>

					<rich:layoutPanel position="left" width="0">
					</rich:layoutPanel>

					<rich:layoutPanel id="body" position="center" >
						<a4j:outputPanel id="versionNoticePlaceHolder" layout="block">
							<h:panelGroup layout="block" styleClass="messages-#{applicationBean.versionNoticeSeverity} version-notice#{applicationBean.menuDisabled ? ' version-notice-topgap' : ''}" rendered="#{applicationBean.versionNoticePresent}">
								<a4j:outputPanel layout="block" styleClass="version-notice-content">
									<h:panelGroup rendered="#{not empty applicationBean.versionNoticeIcon}"><i class="material-icons md-18 version-notice-icon">#{applicationBean.versionNoticeIcon}</i></h:panelGroup>
									<h:outputText value="#{applicationBean.versionNoticeMessage}" styleClass="version-notice-text"/>
									<h:outputLink value="#{applicationBean.versionNoticeActionUrl}" target="_blank" styleClass="version-notice-action" rendered="#{not empty applicationBean.versionNoticeActionUrl and not empty applicationBean.versionNoticeActionLabel}">
										<h:outputText value="#{applicationBean.versionNoticeActionLabel}"/>
									</h:outputLink>
								</a4j:outputPanel>
							</h:panelGroup>
						</a4j:outputPanel>
						<a4j:outputPanel id="errorsPlaceHolder" ajaxRendered="true" layout="block">
							<h:panelGroup layout="block" styleClass="#{facesContext.maximumSeverity.ordinal>=2 ? 'messages-errors' : 'messages-info'}" rendered="#{not empty facesContext.maximumSeverity}">
								<a4j:outputPanel layout="block" styleClass="messages-title">
				  					<h:outputText value="&#160;&#160;" id="infoTitleIcon" styleClass="#{facesContext.maximumSeverity.ordinal>=2 ? 'messages-errors-title-icon' : 'messages-info-title-icon'}"/>
				  					<h:outputText id="infoTitleMessage" value="#{facesContext.maximumSeverity.ordinal>=2 ? 'Messaggio di Errore' : 'Messaggio informativo'}" 
				  						styleClass="messages-title-text"/>
				  				</a4j:outputPanel>
				  				<a4j:outputPanel id="errorMessagesSpacer" layout="block" styleClass="errorsSpacer" />
								<rich:messages id="errorMessages">
								</rich:messages>
							</h:panelGroup>
						</a4j:outputPanel>
						<a4j:outputPanel id="infoPlaceHolder" ajaxRendered="#{not empty sessionScope.acclim}" layout="block">
							<h:panelGroup layout="block" styleClass="messages-errors" rendered="#{not empty sessionScope.acclim}">
								<a4j:outputPanel layout="block" styleClass="messages-title">
				  					<h:outputText value="&#160;&#160;" id="infoTitleIcon2" styleClass="messages-errors-title-icon"/>
				  					<h:outputText id="infoTitleMessage2" value="Messaggio di Errore" styleClass="messages-title-text"/>
				  				</a4j:outputPanel>
				  				<div class="messages-errors-text">
				  					<h:outputText value="#{sessionScope.acclim}" id="messaggioAcclim"/>
				  				</div>
							</h:panelGroup>
						</a4j:outputPanel>
						<h:panelGroup layout="block" rendered="#{not applicationBean.menuDisabled or alwaysShowBody}">
							<ui:insert name="body"/>
						</h:panelGroup>
					</rich:layoutPanel>

					<rich:layoutPanel position="bottom" width="100%">
					</rich:layoutPanel>
				</rich:layout>
		</h:panelGrid>
	</rich:panel>

	<!-- Popup informativo, mostrato una volta dopo il login (contenuto: frammenti HTML fidati dal plugin) -->
	<a4j:outputPanel id="versionPopupCtr" layout="block" ajaxRendered="false" rendered="#{applicationBean.popupPresent and loginBean.showLicensePopup}">
		<rich:modalPanel id="versionPopupModal" autosized="true" width="560" moveable="false">
			<f:facet name="header">
				<h:panelGroup styleClass="version-popup-header version-popup-header-#{applicationBean.popup.severity}">
					<i class="material-icons md-24 version-popup-header-icon">#{applicationBean.popup.icon}</i>
					<h:outputText value="#{applicationBean.popup.title}" escape="false" styleClass="version-popup-title"/>
				</h:panelGroup>
			</f:facet>
			<f:facet name="controls">
				<h:panelGroup layout="inline" styleClass="version-popup-close-ctrl" title="Chiudi" rendered="#{applicationBean.popup.closable}">
					<i class="material-icons md-16">close</i>
				</h:panelGroup>
			</f:facet>
			<div class="version-popup-body">
				<ui:repeat value="#{applicationBean.popup.paragraphs}" var="vpPar">
					<p class="version-popup-paragraph"><h:outputText value="#{vpPar}" escape="false"/></p>
				</ui:repeat>
				<h:panelGroup layout="block" styleClass="version-popup-listhead" rendered="#{not empty applicationBean.popup.listHead}">
					<h:outputText value="#{applicationBean.popup.listHead}" escape="false"/>
				</h:panelGroup>
				<h:panelGroup rendered="#{not empty applicationBean.popup.listItems}">
					<ul class="version-popup-list">
						<ui:repeat value="#{applicationBean.popup.listItems}" var="vpVoce">
							<li><h:outputText value="#{vpVoce}" escape="false"/></li>
						</ui:repeat>
					</ul>
				</h:panelGroup>
				<h:panelGroup layout="block" rendered="#{not empty applicationBean.popup.note}"
					styleClass="version-popup-note version-popup-note-#{empty applicationBean.popup.noteStyle ? 'warning' : applicationBean.popup.noteStyle}">
					<h:outputText value="#{applicationBean.popup.note}" escape="false"/>
				</h:panelGroup>
			</div>
			<div class="version-popup-footer">
				<input type="button" class="version-popup-button" value="#{applicationBean.popup.buttonLabel}"/>
			</div>
		</rich:modalPanel>
		<h:form prependId="false">
			<input type="hidden" id="_csrfVersionPopup" name="_csrf" value="#{loginBean.csrf}"/>
			<a4j:jsFunction name="dismissVersionPopupFn" action="#{loginBean.dismissLicensePopup}"/>
		</h:form>
		<script type="text/javascript" nonce="#{_csp_random_nonce}">
			Richfaces.showModalPanel('versionPopupModal');
				// chiusura via addEventListener (niente onclick inline: bloccato dalla CSP strict-dynamic)
				(function(){
					function dismissVersionPopup(){
						Richfaces.hideModalPanel('versionPopupModal');
						dismissVersionPopupFn();
					}
					var vpBtn = document.querySelector('.version-popup-button');
					if(vpBtn){ vpBtn.addEventListener('click', dismissVersionPopup); }
					var vpClose = document.querySelector('.version-popup-close-ctrl');
					if(vpClose){ vpClose.addEventListener('click', dismissVersionPopup); }
				})();
		</script>
	</a4j:outputPanel>

	<f:facet name="footer" align="center">
		<h:outputLink value="https://www.link.it" target="_blank">
			<h:graphicImage value="/images/tema_link/logo_link_footer.png" title="Link.it" alt="Link.it" />
		</h:outputLink>
	</f:facet>

</rich:page>
