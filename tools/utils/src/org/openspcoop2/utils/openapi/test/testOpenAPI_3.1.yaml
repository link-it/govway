components:

  pathItems:
    Feature31ReusablePathItem:
      post:
        operationId: feature31ReusablePathItemPost
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    minLength: 4
        responses:
          '200':
            description: ok
            content:
              application/json:
                schema:
                  type: object
                  required: [ok]
                  properties:
                    ok:
                      type: boolean

  headers:
    Retry-After:
      description: |-
        Retry contacting the endpoint *at least* after seconds.
        See https://tools.ietf.org/html/rfc7231#section-7.1.3
      schema:
        format: int32
        type: integer
    X-RateLimit-Limit:
      description: The number of allowed requests in the current period
      schema:
        format: int32
        type: integer
        example: 503
        exclusiveMaximum: 600
        minimum: 100
    X-RateLimit-Remaining:
      description: The number of remaining requests in the current period
      schema:
        format: int32
        type: integer
    X-RateLimit-Reset:
      description: The number of seconds left in the current period
      schema:
        format: int32
        type: integer
        
  parameters:
    Feature31QueryTag:
      name: tag
      in: query
      required: true
      schema:
        type: string
        minLength: 2
    profiloRef:
      name: profiloRef
      in: query
      description: |-
            Indica la modalità operativa del Gateway, a scelta tra:
              * APIGateway;
              * SPCoop;
              * FatturaPA;
              * eDelivery.
      required: false
      example: APIGateway
      schema:
        $ref: '#/components/schemas/ProfiloEnum'
    soggettoRef:
      name: soggettoRef
      in: query
      description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
      required: false
      example: ENTE
      schema:
        $ref: '#/components/schemas/SimpleName'
    numeroLimitatoRef:
      name: esempioNumericoRef
      in: query
      description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
      required: true
      example: 34
      schema:
        $ref: '#/components/schemas/NumeroLimitato'
        
    profilo:
      name: profilo
      in: query
      description: |-
            Indica la modalità operativa del Gateway, a scelta tra:
              * APIGateway;
              * SPCoop;
              * FatturaPA;
              * eDelivery.
      required: false
      example: APIGateway
      schema:
        type: string
        enum: ['APIGateway', 'SPCoop', 'FatturaPA', 'eDelivery']
        default: APIGateway
    soggetto:
      name: soggetto
      in: query
      description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
      required: false
      example: ENTE
      schema:
        type: string
        pattern: ^[0-9A-Za-z]+$
        maxLength: 255
        minLength: 2
        description: Formato solo da caratteri e cifre
    numeroLimitato:
      name: esempioNumerico
      in: query
      description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
      required: true
      example: 34
      schema:
        example: 503
        format: int32
        exclusiveMaximum: 600
        minimum: 100
        multipleOf: 10
        type: integer


  requestBodies:
    petRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
    Feature31RequestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                minLength: 2

  responses:
    Feature31Response:
      description: ok
      content:
        application/json:
          schema:
            type: object
            required: [resultId]
            properties:
              resultId:
                type: integer
    error:
      description: Ricevuto errore da pagoPA
      content:
        application/problem+json:
          schema:
            type: object
            allOf:
              - $ref: '#/components/schemas/problem'
              - type: object
                properties:
                  faultBeans:
                    description: Errori ricevuti da pagoPA
                    type: array
                    items:
                      $ref: '#/components/schemas/faultBean'
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
 
  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: 'http://petstore.niis.org/oauth/dialog'
          scopes:
            'write:pets': modify pets in your account
            'read:pets': read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header                     

  schemas:

    # ===== Schemas usati dagli endpoint /feature31/<name>-ref =====
    Feature31TypesArray:
      type: object
      required:
        - name
      properties:
        name:
          type: [string, "null"]
        age:
          type: [integer, "null"]
    Feature31Const:
      type: object
      required: [kind, name]
      properties:
        kind:
          const: Pet
        name:
          type: string
    Feature31Conditional:
      type: object
      required: [country]
      properties:
        country:
          type: string
        postalCode:
          type: string
      if:
        properties:
          country:
            const: IT
      then:
        required: [postalCode]
        properties:
          postalCode:
            pattern: "^[0-9]{5}$"
    Feature31DependentRequired:
      type: object
      properties:
        creditCard:
          type: string
        billingAddress:
          type: string
        cvv:
          type: string
      dependentRequired:
        creditCard:
          - billingAddress
          - cvv
    Feature31PrefixItems:
      type: array
      prefixItems:
        - type: string
        - type: integer
        - type: boolean
      items: false
    Feature31UnevaluatedProperties:
      allOf:
        - type: object
          required: [name]
          properties:
            name:
              type: string
        - type: object
          properties:
            age:
              type: integer
      unevaluatedProperties: false
    Feature31ContentEncoding:
      type: object
      required: [attachment]
      properties:
        attachment:
          type: string
          contentEncoding: base64
          contentMediaType: application/pdf
    Feature31DependentSchemas:
      type: object
      properties:
        creditCard:
          type: string
        billingAddress:
          type: string
      dependentSchemas:
        creditCard:
          required: [billingAddress]
          properties:
            billingAddress:
              type: string
              minLength: 3
    Feature31UnevaluatedItems:
      type: array
      prefixItems:
        - type: string
        - type: integer
      unevaluatedItems: false
    Feature31PropertyNames:
      type: object
      propertyNames:
        pattern: "^[a-z][a-z0-9_]{2,15}$"
    Feature31NullType:
      type: object
      required: [onlyNull]
      properties:
        onlyNull:
          type: "null"
    Feature31MultiType:
      type: object
      required: [anyKind]
      properties:
        anyKind:
          type: [integer, string, "null"]
    Feature31RequiredEmpty:
      type: object
      required: []
      properties:
        anything:
          type: string
    Feature31Defs:
      type: object
      required: [id]
      properties:
        id:
          $ref: '#/components/schemas/Feature31Defs/$defs/Identifier'
      $defs:
        Identifier:
          type: string
          pattern: "^[A-Z]{2}[0-9]{4}$"
    Feature31ContentMediaType:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
          contentEncoding: base64
          contentMediaType: application/json
          contentSchema:
            type: object
            required: [id]
            properties:
              id:
                type: integer
    Feature31MinMaxContains:
      type: array
      items:
        type: integer
      contains:
        type: integer
        multipleOf: 2
      minContains: 2
      maxContains: 3
    Feature31PatternProperties:
      type: object
      patternProperties:
        "^s_":
          type: string
        "^i_":
          type: integer
      additionalProperties: false
    Feature31ExamplesArray:
      type: object
      required: [name]
      properties:
        name:
          type: string
          examples: ["alice", "bob", "carol"]
      examples:
        - name: alice
        - name: bob
    Feature31EnumMixed:
      type: object
      required: [value]
      properties:
        value:
          type: [integer, string, "null", boolean]
          enum: [1, "x", null, true]
    Feature31NotKeyword:
      type: object
      required: [value]
      properties:
        value:
          not:
            type: integer
    Feature31FormatExtensions:
      type: object
      required: [id, dur]
      properties:
        id:
          type: string
          format: uuid
        dur:
          type: string
          format: duration

    problem:
      properties:
        detail:
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
          type: string
        instance:
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
          format: uri
          type: string
        status:
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          format: int32
          exclusiveMaximum: 600
          minimum: 100
          type: integer
        title:
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); 
          example: Service Unavailable
          type: string
        type:
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://tools.ietf.org/html/rfc7231#section-6.6.4
          format: uri
          type: string
      type: object  
      
    faultBean:
      type: object
      required:
        - faultCode
        - faultString
        - id
      properties:
        faultCode:
          type: string
        faultString:
          type: string
        id:
          type: string
        description:
          type: string
        serial:
          type: string
        originalFaultCode:
          type: string
        originalFaultString:
          type: string
        originalDescription:
          type: string  
  
    Pet:
      allOf:
        - $ref: '#/components/schemas/NewPet'
        - type: object
          required:
            - id
          properties:
              id:
                type: integer
                format: int64
    NewPet:
      type: object
      title: petTitle
      required:
        - name
        - photoUrls
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: doggie
        photoUrls:
          type: array
          xml:
            name: photoUrl
            wrapped: true
          items:
            type: string
        tags:
          type: array
          xml:
            name: tag
            wrapped: true
          items:
            type: string
        status:
          type: string
          description: pet status in the store
          enum:
            - available
            - pending
            - sold

    Import2NewPet:
      $ref: 'http://hostCasualeVerraNormalizzato.org/test/test_import.yaml#/components/schemas/ImportNewPet'
  
    Error:
      type: object
      required:
        - code
        - message
      additionalProperties: false
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string

    SimpleName:
      type: string
      pattern: ^[0-9A-Za-z]+$
      maxLength: 255
      minLength: 1
      description: Formato solo da caratteri e cifre
    NCName:
      type: string
      pattern: ^[_A-Za-z][\\-\\._A-Za-z0-9]*$
      maxLength: 255
      description: Può iniziare solo con un carattere [A-Za-z] o il simbolo '_' e dev'essere formato solo da caratteri, cifre, '_' , '-' e '.'
    ProfiloEnum:
