openapi: "3.1.0"
info:
  version: 1.0.0
  title: Swagger Petstore
  summary: A sample API used to exercise OpenAPI 3.1 features
  description: A sample API that uses a petstore as an example to demonstrate features in the OpenAPI 3.1 specification
  termsOfService: http://swagger.io/terms/
  contact:
    name: Swagger API Team
    email: foo@example.com
    url: http://madskristensen.net
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://petstore.swagger.io/api
webhooks:
  petUpdated:
    post:
      requestBody:
        description: notification of pet updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: webhook received
paths:
  /pets:
    get:
      description: |
        Returns all pets from the system that the user has access to
        Nam sed condimentum est. Maecenas tempor sagittis sapien, nec rhoncus sem sagittis sit amet. Aenean at gravida augue, ac iaculis sem. Curabitur odio lorem, ornare eget elementum nec, cursus id lectus. Duis mi turpis, pulvinar ac eros ac, tincidunt varius justo. In hac habitasse platea dictumst. Integer at adipiscing ante, a sagittis ligula. Aenean pharetra tempor ante molestie imperdiet. Vivamus id aliquam diam. Cras quis velit non tortor eleifend sagittis. Praesent at enim pharetra urna volutpat venenatis eget eget mauris. In eleifend fermentum facilisis. Praesent enim enim, gravida ac sodales sed, placerat id erat. Suspendisse lacus dolor, consectetur non augue vel, vehicula interdum libero. Morbi euismod sagittis libero sed lacinia.

        Sed tempus felis lobortis leo pulvinar rutrum. Nam mattis velit nisl, eu condimentum ligula luctus nec. Phasellus semper velit eget aliquet faucibus. In a mattis elit. Phasellus vel urna viverra, condimentum lorem id, rhoncus nibh. Ut pellentesque posuere elementum. Sed a varius odio. Morbi rhoncus ligula libero, vel eleifend nunc tristique vitae. Fusce et sem dui. Aenean nec scelerisque tortor. Fusce malesuada accumsan magna vel tempus. Quisque mollis felis eu dolor tristique, sit amet auctor felis gravida. Sed libero lorem, molestie sed nisl in, accumsan tempor nisi. Fusce sollicitudin massa ut lacinia mattis. Sed vel eleifend lorem. Pellentesque vitae felis pretium, pulvinar elit eu, euismod sapien.
      operationId: findPets
      parameters:
        - name: tags
          in: query
          description: tags to filter by
          required: false
          style: form
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          description: maximum number of results to return
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      description: Creates a new pet in the store.  Duplicates are allowed
      operationId: addPet
      requestBody:
        description: Pet to add to the store
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '405':
          description: Invalid input
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/error'
    put:
      description: Creates a new pet in the store.  Duplicates are allowed
      operationId: updatePet
      requestBody:
        description: Pet to add to the store
        required: true
        content:
          application/json:
            schema:
              $ref: 'test_import.yaml#/components/schemas/ImportNewPet'
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                $ref: 'test_import.yaml#/components/schemas/ImportPet'
        '404':
          description: Pet not found
        '405':
          description: Validation exception
        '400':
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: 'test_import.yaml#/components/schemas/ImportError'
        '500':
          $ref: '#/components/responses/error'
    delete:
      description: Creates a new pet in the store.  Duplicates are allowed
      operationId: delete pet
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                $ref: 'test_import2.yaml#/components/schemas/Import2Pet'
        '404':
          description: Pet not found
        '405':
          description: Validation exception
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: 'test_import2.yaml#/components/schemas/Import2Error'
  /pets/{id}:
    get:
      description: Returns a user based on a single ID, if the user does not have access to the pet
      operationId: find pet by id
      parameters:
        - name: id
          in: path
          description: ID of pet to fetch
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      description: Returns a user based on a single ID, if the user does not have access to the pet
      operationId: aggiorna pet by id
      parameters:
        - name: id
          in: path
          description: ID of pet to fetch
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: pet response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pets/{petId}/uploadImage:
    post:
      tags:
        - pet
      summary: uploads an image
      description: ''
      operationId: uploadFile
      parameters:
        - name: petId
          in: path
          description: ID of pet
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                additionalMetadata:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
            description: successful operation
            content:
              application/json:
                schema:
                 $ref: '#/components/schemas/Pet'
        '500':
          $ref: '#/components/responses/error'
      security:
        - petstore_auth:
            - 'write:pets'
            - 'read:pets'
  /pets/{petId}/completa:
    post:
      tags:
        - pet
      summary: operazione completa
      description: ''
      operationId: completa
      parameters:
        - name: petId
          in: path
          description: ID of pet
          required: true
          schema:
            type: integer
            format: int64
        - name: petName
          in: query
          description: name of pet
          required: true
          schema:
            type: integer
            format: int64
        - name: X-limit-Pets
          in: header
          description: limit of pets
          required: true
          schema:
            type: integer
            format: int64
        - name: X-Session
          in: cookie
          description: cookie sessione
          required: true
          schema:
            type: integer
            format: int64
            
        - $ref: "#/components/parameters/profilo"
        - $ref: "#/components/parameters/soggetto"
        - $ref: "#/components/parameters/numeroLimitato"
        
        - $ref: "#/components/parameters/profiloRef"
        - $ref: "#/components/parameters/soggettoRef"
        - $ref: "#/components/parameters/numeroLimitatoRef"
        
        - name: profiloRefInLine
          in: query
          description: |-
                Indica la modalità operativa del Gateway, a scelta tra:
                  * APIGateway;
                  * SPCoop;
                  * FatturaPA;
                  * eDelivery.
          required: false
          example: APIGateway
          schema:
            $ref: '#/components/schemas/ProfiloEnum'
        - name: soggettoRefInLine
          in: query
          description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
          required: false
          example: ENTE
          schema:
            $ref: '#/components/schemas/SimpleName'
        - name: numeroLimitatoRefInLine
          in: query
          description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
          required: true
          example: 34
          schema:
            $ref: '#/components/schemas/NumeroLimitato'
            
        - name: profiloInLine
          in: query
          description: |-
                Indica la modalità operativa del Gateway, a scelta tra:
                  * APIGateway;
                  * SPCoop;
                  * FatturaPA;
                  * eDelivery.
          required: false
          example: APIGateway
          schema:
            type: string
            enum: ['APIGateway', 'SPCoop', 'FatturaPA', 'eDelivery']
            default: APIGateway
        - name: soggettoInLine
          in: query
          description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
          required: false
          example: ENTE
          schema:
            type: string
            pattern: ^[0-9A-Za-z]+$
            maxLength: 255
            minLength: 2
            description: Formato solo da caratteri e cifre
        - name: numeroLimitatoInLine
          in: query
          description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
          required: true
          example: 34
          schema:
            example: 503
            format: int32
            exclusiveMaximum: 600
            minimum: 100
            multipleOf: 10
            type: integer
         
      requestBody:
        $ref: '#/components/requestBodies/petRequest'
      responses:
        '200':
            description: successful operation
            content:
              application/json:
                schema:
                 $ref: '#/components/schemas/Pet'
            headers:
              Retry-After:
                $ref: '#/components/headers/Retry-After'
              X-RateLimit-Limit:
                $ref: '#/components/headers/X-RateLimit-Limit'
              X-RateLimit-Remaining:
                $ref: '#/components/headers/X-RateLimit-Remaining'
              X-RateLimit-Reset:
                $ref: '#/components/headers/X-RateLimit-Reset'
        '500':
          $ref: '#/components/responses/error'

      security:
        - petstore_auth:
            - 'write:pets'
            - 'read:pets'
  /pets/findByStatus:
    parameters:
      - $ref: "#/components/parameters/profilo"
      - $ref: "#/components/parameters/soggetto"
      - $ref: "#/components/parameters/numeroLimitato"
      
      - $ref: "#/components/parameters/profiloRef"
      - $ref: "#/components/parameters/soggettoRef"
      - $ref: "#/components/parameters/numeroLimitatoRef"
      
      - name: profiloRefInLineByStatus
        in: query
        description: |-
              Indica la modalità operativa del Gateway, a scelta tra:
                * APIGateway;
                * SPCoop;
                * FatturaPA;
                * eDelivery.
        required: false
        example: APIGateway
        schema:
          $ref: '#/components/schemas/ProfiloEnum'
      - name: soggettoRefInLineByStatus
        in: query
        description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
        required: false
        example: ENTE
        schema:
          $ref: '#/components/schemas/SimpleName'
      - name: numeroLimitatoRefInLineByStatus
        in: query
        description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
        required: true
        example: 34
        schema:
          $ref: '#/components/schemas/NumeroLimitato'
          
      - name: profiloInLineByStatus
        in: query
        description: |-
              Indica la modalità operativa del Gateway, a scelta tra:
                * APIGateway;
                * SPCoop;
                * FatturaPA;
                * eDelivery.
        required: false
        example: APIGateway
        schema:
          type: string
          enum: ['APIGateway', 'SPCoop', 'FatturaPA', 'eDelivery']
          default: APIGateway
      - name: soggettoInLineByStatus
        in: query
        description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
        required: false
        example: ENTE
        schema:
          type: string
          pattern: ^[0-9A-Za-z]+$
          maxLength: 255
          minLength: 2
          description: Formato solo da caratteri e cifre
      - name: numeroLimitatoInLineByStatus
        in: query
        description: Indica il Soggetto di dominio interno indirizzato dall'operazione.
        required: true
        example: 34
        schema:
          example: 503
          format: int32
          exclusiveMaximum: 600
          minimum: 100
          multipleOf: 10
          type: integer
       
    get:
      description: Returns a user based on a status, if the user does not have access to the pet
      operationId: find pet by status
      parameters:
        - name: status
          in: query
          description: status of pet to fetch
          required: true
          schema:
            type: string
      responses:
        '200':
          description: pet response
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Request limit per hour.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: The number of requests left for the time window.
            X-RateLimit-Reset:
              schema:
                type: string
                format: date-time
              description: The UTC date/time at which the current rate limit window resets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                
  /pets/altro/{id}:
    delete:
      description: deletes a single pet based on the ID supplied
      operationId: deletePet
      parameters:
        - name: id
          in: path
          description: ID of pet to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: pet deleted
        '500':
          $ref: '#/components/responses/error'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ===== feature: type array (sostituisce nullable) =====
  /feature31/types-array-inline:
    post:
      operationId: feature31TypesArrayInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: [string, "null"]
                age:
                  type: [integer, "null"]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                properties:
                  name:
                    type: [string, "null"]
                  age:
                    type: [integer, "null"]
  /feature31/types-array-ref:
    post:
      operationId: feature31TypesArrayRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31TypesArray'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31TypesArray'

  # ===== feature: const =====
  /feature31/const-value-inline:
    post:
      operationId: feature31ConstInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, name]
              properties:
                kind:
                  const: Pet
                name:
                  type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [kind, name]
                properties:
                  kind:
                    const: Pet
                  name:
                    type: string
  /feature31/const-value-ref:
    post:
      operationId: feature31ConstRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31Const'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31Const'

  # ===== feature: if/then/else =====
  /feature31/conditional-inline:
    post:
      operationId: feature31ConditionalInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country]
              properties:
                country:
                  type: string
                postalCode:
                  type: string
              if:
                properties:
                  country:
                    const: IT
              then:
                required: [postalCode]
                properties:
                  postalCode:
                    pattern: "^[0-9]{5}$"
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [country]
                properties:
                  country:
                    type: string
                  postalCode:
                    type: string
                if:
                  properties:
                    country:
                      const: IT
                then:
                  required: [postalCode]
                  properties:
                    postalCode:
                      pattern: "^[0-9]{5}$"
  /feature31/conditional-ref:
    post:
      operationId: feature31ConditionalRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31Conditional'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31Conditional'

  # ===== feature: dependentRequired =====
  /feature31/dependent-required-inline:
    post:
      operationId: feature31DependentRequiredInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                creditCard:
                  type: string
                billingAddress:
                  type: string
                cvv:
                  type: string
              dependentRequired:
                creditCard:
                  - billingAddress
                  - cvv
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  creditCard:
                    type: string
                  billingAddress:
                    type: string
                  cvv:
                    type: string
                dependentRequired:
                  creditCard:
                    - billingAddress
                    - cvv
  /feature31/dependent-required-ref:
    post:
      operationId: feature31DependentRequiredRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31DependentRequired'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31DependentRequired'

  # ===== feature: prefixItems (tuple) =====
  /feature31/prefix-items-inline:
    post:
      operationId: feature31PrefixItemsInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              prefixItems:
                - type: string
                - type: integer
                - type: boolean
              items: false
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                prefixItems:
                  - type: string
                  - type: integer
                  - type: boolean
                items: false
  /feature31/prefix-items-ref:
    post:
      operationId: feature31PrefixItemsRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31PrefixItems'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31PrefixItems'

  # ===== feature: unevaluatedProperties =====
  /feature31/unevaluated-props-inline:
    post:
      operationId: feature31UnevaluatedPropsInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                - type: object
                  properties:
                    age:
                      type: integer
              unevaluatedProperties: false
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                  - type: object
                    properties:
                      age:
                        type: integer
                unevaluatedProperties: false
  /feature31/unevaluated-props-ref:
    post:
      operationId: feature31UnevaluatedPropsRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31UnevaluatedProperties'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31UnevaluatedProperties'

  # ===== feature: contentEncoding / contentMediaType =====
  /feature31/content-encoding-inline:
    post:
      operationId: feature31ContentEncodingInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attachment]
              properties:
                attachment:
                  type: string
                  contentEncoding: base64
                  contentMediaType: application/pdf
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [attachment]
                properties:
                  attachment:
                    type: string
                    contentEncoding: base64
                    contentMediaType: application/pdf
  /feature31/content-encoding-ref:
    post:
      operationId: feature31ContentEncodingRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31ContentEncoding'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31ContentEncoding'

  # ===== feature: dependentSchemas =====
  /feature31/dependent-schemas-inline:
    post:
      operationId: feature31DependentSchemasInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                creditCard:
                  type: string
                billingAddress:
                  type: string
              dependentSchemas:
                creditCard:
                  required: [billingAddress]
                  properties:
                    billingAddress:
                      type: string
                      minLength: 3
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  creditCard:
                    type: string
                  billingAddress:
                    type: string
                dependentSchemas:
                  creditCard:
                    required: [billingAddress]
                    properties:
                      billingAddress:
                        type: string
                        minLength: 3
  /feature31/dependent-schemas-ref:
    post:
      operationId: feature31DependentSchemasRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31DependentSchemas'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31DependentSchemas'

  # ===== feature: unevaluatedItems =====
  /feature31/unevaluated-items-inline:
    post:
      operationId: feature31UnevaluatedItemsInline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              prefixItems:
                - type: string
                - type: integer
              unevaluatedItems: false
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                prefixItems:
                  - type: string
                  - type: integer
                unevaluatedItems: false
  /feature31/unevaluated-items-ref:
    post:
      operationId: feature31UnevaluatedItemsRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feature31UnevaluatedItems'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature31UnevaluatedItems'

  # ===== feature: propertyNames =====
