# Limiti definiti nella classe org.yaml.snakeyaml.LoaderOptions
# Questo file consente di modificarli
    
#allowDuplicateKeys=true

#wrappedToRootException=false

maxAliasesForCollections=500

#allowRecursiveKeys=false
    
#processComments=false
    
#enumCaseSensitive=true
    
#nestingDepthLimit=50

# Default modificato in 10MB
# 10 * 1024 * 1024
codePointLimit=10485760

# Fattore moltiplicativo rispetto alla dimensione dell'input YAML per il limite massimo
# del JSON prodotto dalla risoluzione degli anchor/alias.
# Protegge da attacchi "billion laughs" in cui pochi alias annidati producono un'espansione esponenziale.
# Il limite effettivo è: dimensione_input_yaml * resolvedAnchorSizeFactor
# Valori ammessi: decimali >= 1.0 (es. 1.5, 2, 2.5, 3)
resolvedAnchorSizeFactor=10
